app:
  name: Tomcat Loadgen
  code: TCLG
  notify: ssankar@ecloudcontrol.com

build:
  version: 0.3
  env: DEV2
  build_file: pom.xml
  output_files: output/*.war
  image_template: tomcat9

deploy:
  context: alpha/DEV2
  replicas: 1
  port: 8080
  strategy : rolling
  ready_seconds : 45

properties:
  title: Tomcat Loadgen - Demo over Teams on Monday
  head_color : Green
  threads: 0
  delay: 60
  next: 60
  download: true
  random : true
  nano : 420
  revision : 1

